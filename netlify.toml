[build]
  command = "npm run build:static"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# Force HTTP → HTTPS (eliminates the split index Google has between http:// and https://)
[[redirects]]
  from = "http://www.ihpgreenville.com/*"
  to = "https://www.ihpgreenville.com/:splat"
  status = 301
  force = true

[[redirects]]
  from = "http://ihpgreenville.com/*"
  to = "https://www.ihpgreenville.com/:splat"
  status = 301
  force = true

# Proxy /admin to Railway server (keeps URL as ihpgreenville.com/admin)
[[redirects]]
  from = "/admin"
  to = "https://ihp-greenville-website-production.up.railway.app/admin"
  status = 200
  force = true

[[redirects]]
  from = "/admin/*"
  to = "https://ihp-greenville-website-production.up.railway.app/admin/:splat"
  status = 200
  force = true

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "*.html"
  [headers.values]
    Cache-Control = "public, max-age=3600, stale-while-revalidate=86400"

[[headers]]
  for = "/blog/*"
  [headers.values]
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/services/*"
  [headers.values]
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/conditions/*"
  [headers.values]
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/sitemap.xml"
  [headers.values]
    Cache-Control = "public, max-age=3600"
    Content-Type = "application/xml; charset=utf-8"

[[headers]]
  for = "/robots.txt"
  [headers.values]
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/llms.txt"
  [headers.values]
    Cache-Control = "public, max-age=3600"
